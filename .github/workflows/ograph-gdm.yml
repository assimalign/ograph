name: ograph-gdm

# Gdm library (libraries/Assimalign.OGraph.Gdm). Build is a required gate.
# Tests run but are non-blocking for now: the suite is pre-existing red
# (GdmException vs GdmModelException expectations) — tracked in #90. Drop
# allow-test-failure once the suite is green.
#
# Runner: ubuntu-latest.

on:
  push:
    branches: [main, development]
    paths:
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'build/**'
      - 'libraries/Directory.Build.props'
      - 'libraries/Directory.Build.targets'
      - 'libraries/Assimalign.OGraph.Gdm/**'
      - '.github/actions/build/**'
      - '.github/workflows/ograph-gdm.yml'
  pull_request:
    paths:
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'build/**'
      - 'libraries/Directory.Build.props'
      - 'libraries/Directory.Build.targets'
      - 'libraries/Assimalign.OGraph.Gdm/**'
      - '.github/actions/build/**'
      - '.github/workflows/ograph-gdm.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build
        with:
          project: libraries/Assimalign.OGraph.Gdm/src/Assimalign.OGraph.Gdm.csproj
          tests: libraries/Assimalign.OGraph.Gdm/tests/Assimalign.OGraph.Gdm.Tests.csproj
          allow-test-failure: 'true'
          annotation-title: Gdm
