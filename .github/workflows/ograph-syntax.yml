name: ograph-syntax

# Syntax library (libraries/Assimalign.OGraph.Syntax). Build is a required gate.
# Tests run but are non-blocking for now: filter/sort paths and the base
# QueryVisitor are unfinished, so part of the suite is pre-existing red —
# tracked in #90. Drop allow-test-failure once the suite is green.
#
# Runner: ubuntu-latest.

on:
  push:
    branches: [main, development]
    paths:
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'build/**'
      - 'libraries/Directory.Build.props'
      - 'libraries/Directory.Build.targets'
      - 'libraries/Assimalign.OGraph.Syntax/**'
      - '.github/actions/build/**'
      - '.github/workflows/ograph-syntax.yml'
  pull_request:
    paths:
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'build/**'
      - 'libraries/Directory.Build.props'
      - 'libraries/Directory.Build.targets'
      - 'libraries/Assimalign.OGraph.Syntax/**'
      - '.github/actions/build/**'
      - '.github/workflows/ograph-syntax.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build
        with:
          project: libraries/Assimalign.OGraph.Syntax/src/Assimalign.OGraph.Syntax.csproj
          tests: libraries/Assimalign.OGraph.Syntax/tests/Assimalign.OGraph.Syntax.Tests.csproj
          allow-test-failure: 'true'
          annotation-title: Syntax
