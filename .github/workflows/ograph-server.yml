name: ograph-server

# Server library (libraries/Assimalign.OGraph.Server).
#
# NON-BLOCKING BY DESIGN. Server/src currently has ~37 pre-existing compile
# errors (deferred feature work — GdmLabel/Label/Either<,> types, unimplemented
# interface members). Until the baseline restore lands (roadmap N-08) this area
# must not gate CI, but its failure must stay LOUD and ISOLATED
# so it never masks a regression in a required area:
#   * the job sets continue-on-error: true (a red build cannot fail the run);
#   * the composite's allow-build-failure downgrades the failure to a ::warning
#     annotation instead of hiding it.
# Remove both switches once Server compiles.
#
# Runner: ubuntu-latest.

on:
  push:
    branches: [main, development]
    paths:
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'build/**'
      - 'libraries/Directory.Build.props'
      - 'libraries/Directory.Build.targets'
      - 'libraries/Assimalign.OGraph.Server/**'
      - '.github/actions/build/**'
      - '.github/workflows/ograph-server.yml'
  pull_request:
    paths:
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'build/**'
      - 'libraries/Directory.Build.props'
      - 'libraries/Directory.Build.targets'
      - 'libraries/Assimalign.OGraph.Server/**'
      - '.github/actions/build/**'
      - '.github/workflows/ograph-server.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    # Non-blocking: Server's deferred compile errors must not fail the run.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build
        with:
          project: libraries/Assimalign.OGraph.Server/src/Assimalign.OGraph.Server.csproj
          tests: libraries/Assimalign.OGraph.Server/tests/Assimalign.OGraph.Server.Tests.csproj
          allow-build-failure: 'true'
          allow-test-failure: 'true'
          annotation-title: Server
